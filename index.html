<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>World Cup 2026 Draft</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow+Condensed:wght@400;600;700&family=Barlow:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --gold: #F5C518;
    --red: #C0392B;
    --dark: #0a0a0f;
    --darker: #050508;
    --mid: #13131a;
    --card: #1a1a24;
    --border: #2a2a3a;
    --text: #e8e8f0;
    --muted: #888899;
    --green: #27ae60;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--darker);
    color: var(--text);
    font-family: 'Barlow', sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* HERO */
  header {
    background: var(--darker);
    border-bottom: 3px solid var(--gold);
    padding: 0;
    position: relative;
    overflow: hidden;
  }

  .header-bg {
    position: absolute;
    inset: 0;
    background: 
      radial-gradient(ellipse at 20% 50%, rgba(197,48,32,0.15) 0%, transparent 60%),
      radial-gradient(ellipse at 80% 50%, rgba(245,197,24,0.08) 0%, transparent 60%);
  }

  .header-inner {
    position: relative;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 18px 40px;
    max-width: 1200px;
    margin: 0 auto;
  }

  .logo {
    display: flex;
    align-items: center;
    gap: 14px;
  }

  .logo-icon {
    width: 48px;
    height: 48px;
    background: var(--gold);
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 24px;
    flex-shrink: 0;
  }

  .logo-text h1 {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 28px;
    letter-spacing: 2px;
    color: #fff;
    line-height: 1;
  }

  .logo-text span {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 13px;
    color: var(--gold);
    letter-spacing: 4px;
    text-transform: uppercase;
  }

  nav {
    display: flex;
    gap: 4px;
  }

  nav button {
    background: transparent;
    border: none;
    color: var(--muted);
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 13px;
    font-weight: 600;
    letter-spacing: 2px;
    text-transform: uppercase;
    padding: 8px 16px;
    cursor: pointer;
    border-radius: 4px;
    transition: all 0.2s;
    position: relative;
  }

  nav button:hover { color: var(--text); background: rgba(255,255,255,0.05); }
  nav button.active { color: var(--gold); }
  nav button.active::after {
    content: '';
    position: absolute;
    bottom: -2px;
    left: 16px; right: 16px;
    height: 2px;
    background: var(--gold);
  }

  /* MAIN */
  main {
    max-width: 1200px;
    margin: 0 auto;
    padding: 40px 40px 80px;
  }

  .section { display: none; }
  .section.active { display: block; }

  /* SECTION HEADER */
  .section-header {
    display: flex;
    align-items: baseline;
    gap: 16px;
    margin-bottom: 32px;
    border-left: 4px solid var(--gold);
    padding-left: 16px;
  }

  .section-header h2 {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 42px;
    letter-spacing: 3px;
    color: #fff;
    line-height: 1;
  }

  .section-header p {
    color: var(--muted);
    font-size: 13px;
    font-family: 'Barlow Condensed', sans-serif;
    letter-spacing: 2px;
    text-transform: uppercase;
  }

  /* LOADING */
  .loading {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 12px;
    padding: 60px;
    color: var(--muted);
    font-family: 'Barlow Condensed', sans-serif;
    letter-spacing: 2px;
    font-size: 14px;
  }

  .spinner {
    width: 20px; height: 20px;
    border: 2px solid var(--border);
    border-top-color: var(--gold);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }

  @keyframes spin { to { transform: rotate(360deg); } }

  /* ERROR */
  .error-msg {
    background: rgba(192,57,43,0.1);
    border: 1px solid rgba(192,57,43,0.3);
    border-radius: 8px;
    padding: 20px 24px;
    color: #e88;
    font-size: 14px;
    margin: 20px 0;
  }

  /* TABLE */
  .table-wrap {
    overflow-x: auto;
    border-radius: 8px;
    border: 1px solid var(--border);
  }

  table {
    width: 100%;
    border-collapse: collapse;
    font-size: 14px;
  }

  thead tr {
    background: var(--mid);
  }

  thead th {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--gold);
    padding: 12px 16px;
    text-align: left;
    border-bottom: 1px solid var(--border);
    white-space: nowrap;
  }

  tbody tr {
    border-bottom: 1px solid rgba(42,42,58,0.5);
    transition: background 0.15s;
  }

  tbody tr:hover { background: rgba(245,197,24,0.03); }
  tbody tr:last-child { border-bottom: none; }

  tbody td {
    padding: 11px 16px;
    color: var(--text);
    vertical-align: middle;
  }

  /* RANK */
  .rank {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 20px;
    color: var(--muted);
    width: 40px;
  }

  .rank-1 { color: #F5C518; }
  .rank-2 { color: #C0C0C0; }
  .rank-3 { color: #CD7F32; }

  /* PLAYER NAME */
  .player-name {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 16px;
    font-weight: 600;
    letter-spacing: 0.5px;
  }

  /* SCORE BADGE */
  .score-badge {
    display: inline-block;
    background: rgba(245,197,24,0.12);
    border: 1px solid rgba(245,197,24,0.25);
    color: var(--gold);
    font-family: 'Bebas Neue', sans-serif;
    font-size: 18px;
    padding: 2px 10px;
    border-radius: 4px;
    letter-spacing: 1px;
  }

  /* MATCHDAY TABS */
  .sub-tabs {
    display: flex;
    gap: 8px;
    margin-bottom: 28px;
    flex-wrap: wrap;
  }

  .sub-tab {
    background: var(--card);
    border: 1px solid var(--border);
    color: var(--muted);
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 13px;
    font-weight: 600;
    letter-spacing: 2px;
    text-transform: uppercase;
    padding: 8px 20px;
    border-radius: 4px;
    cursor: pointer;
    transition: all 0.2s;
  }

  .sub-tab:hover { border-color: var(--gold); color: var(--text); }
  .sub-tab.active { background: var(--gold); color: var(--dark); border-color: var(--gold); }

  /* MATCH CARD */
  .matches-grid {
    display: flex;
    flex-direction: column;
    gap: 12px;
  }

  .match-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 16px 20px;
    display: grid;
    grid-template-columns: 1fr auto 1fr;
    align-items: center;
    gap: 16px;
    transition: border-color 0.2s;
  }

  .match-card:hover { border-color: rgba(245,197,24,0.3); }

  .match-team {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 18px;
    font-weight: 700;
    letter-spacing: 0.5px;
  }

  .match-team.home { text-align: right; }
  .match-team.away { text-align: left; }

  .match-score {
    display: flex;
    align-items: center;
    gap: 8px;
    font-family: 'Bebas Neue', sans-serif;
    font-size: 28px;
    letter-spacing: 2px;
    color: var(--gold);
    white-space: nowrap;
  }

  .match-score .sep { color: var(--muted); font-size: 20px; }

  .date-label {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 11px;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: var(--gold);
    margin: 20px 0 10px;
    padding: 4px 0;
    border-bottom: 1px solid var(--border);
  }

  .group-label {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 10px;
    letter-spacing: 2px;
    color: var(--muted);
    text-transform: uppercase;
    margin-bottom: 2px;
  }

  /* DRAFT TABLE */
  .draft-table td:first-child {
    font-family: 'Barlow Condensed', sans-serif;
    font-weight: 700;
    font-size: 15px;
  }

  /* EMBED FALLBACK */
  .embed-container {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 8px;
    overflow: hidden;
  }

  .embed-container iframe {
    width: 100%;
    height: 700px;
    border: none;
    display: block;
  }

  /* LIVE BADGE */
  .live-badge {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    background: rgba(192,57,43,0.15);
    border: 1px solid rgba(192,57,43,0.4);
    color: #e88;
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 2px;
    text-transform: uppercase;
    padding: 4px 10px;
    border-radius: 3px;
    margin-left: 12px;
  }

  .live-dot {
    width: 6px; height: 6px;
    background: #e44;
    border-radius: 50%;
    animation: pulse 1.2s ease-in-out infinite;
  }

  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.3} }

  /* REFRESH */
  .refresh-btn {
    background: transparent;
    border: 1px solid var(--border);
    color: var(--muted);
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 12px;
    letter-spacing: 2px;
    text-transform: uppercase;
    padding: 6px 14px;
    border-radius: 4px;
    cursor: pointer;
    transition: all 0.2s;
    margin-left: auto;
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .refresh-btn:hover { border-color: var(--gold); color: var(--gold); }

  .section-meta {
    display: flex;
    align-items: center;
    margin-bottom: 24px;
    gap: 12px;
  }

  .last-updated {
    font-size: 12px;
    color: var(--muted);
    font-family: 'Barlow Condensed', sans-serif;
    letter-spacing: 1px;
  }

  /* GROUPS GRID */
  .groups-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
    gap: 16px;
  }

  .group-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 8px;
    overflow: hidden;
  }

  .group-card-header {
    background: var(--mid);
    padding: 10px 16px;
    font-family: 'Bebas Neue', sans-serif;
    font-size: 20px;
    letter-spacing: 3px;
    color: var(--gold);
    border-bottom: 1px solid var(--border);
  }

  .group-card table { font-size: 13px; }
  .group-card thead th { font-size: 10px; padding: 8px 12px; }
  .group-card tbody td { padding: 9px 12px; }

  /* RESPONSIVE */
  @media (max-width: 768px) {
    .header-inner { padding: 14px 20px; flex-wrap: wrap; gap: 12px; }
    nav { gap: 2px; }
    nav button { padding: 6px 10px; font-size: 11px; }
    main { padding: 24px 16px 60px; }
    .section-header h2 { font-size: 32px; }
    .match-card { grid-template-columns: 1fr; text-align: center; }
    .match-team.home { text-align: center; }
    .match-score { justify-content: center; }
  }
</style>
</head>
<body>

<header>
  <div class="header-bg"></div>
  <div class="header-inner">
    <div class="logo">
      <div class="logo-icon">⚽</div>
      <div class="logo-text">
        <h1>World Cup 2026</h1>
        <span>Draft League</span>
      </div>
    </div>
    <nav>
      <button class="active" onclick="showSection('leaderboard', this)">Leaderboard</button>
      <button onclick="showSection('matches', this)">Matches</button>
      <button onclick="showSection('draft', this)">Draft</button>
      <button onclick="showSection('groups', this)">Groups</button>
    </nav>
  </div>
</header>

<main>

  <!-- LEADERBOARD -->
  <div class="section active" id="leaderboard">
    <div class="section-header">
      <h2>Leaderboard</h2>
      <p>Live standings</p>
    </div>
    <div class="section-meta">
      <span class="last-updated" id="lb-updated">Loading…</span>
      <button class="refresh-btn" onclick="loadSection('leaderboard')">↻ Refresh</button>
    </div>
    <div id="lb-content"><div class="loading"><div class="spinner"></div>Fetching standings…</div></div>
  </div>

  <!-- MATCHES -->
  <div class="section" id="matches">
    <div class="section-header">
      <h2>Matches</h2>
      <p>Matchday results</p>
    </div>
    <div class="sub-tabs">
      <button class="sub-tab active" onclick="loadMatchday(1, this)">Matchday 1</button>
      <button class="sub-tab" onclick="loadMatchday(2, this)">Matchday 2</button>
      <button class="sub-tab" onclick="loadMatchday(3, this)">Matchday 3</button>
    </div>
    <div id="matches-content"><div class="loading"><div class="spinner"></div>Fetching matches…</div></div>
  </div>

  <!-- DRAFT -->
  <div class="section" id="draft">
    <div class="section-header">
      <h2>Draft</h2>
      <p>Team selections</p>
    </div>
    <div class="section-meta">
      <span class="last-updated" id="draft-updated">Loading…</span>
      <button class="refresh-btn" onclick="loadSection('draft')">↻ Refresh</button>
    </div>
    <div id="draft-content"><div class="loading"><div class="spinner"></div>Fetching draft…</div></div>
  </div>

  <!-- GROUPS -->
  <div class="section" id="groups">
    <div class="section-header">
      <h2>Groups</h2>
      <p>Group stage standings</p>
    </div>
    <div class="section-meta">
      <span class="last-updated" id="groups-updated">Loading…</span>
      <button class="refresh-btn" onclick="loadSection('groups')">↻ Refresh</button>
    </div>
    <div id="groups-content"><div class="loading"><div class="spinner"></div>Fetching groups…</div></div>
  </div>

</main>

<script>
const SHEET_ID = '1SIXgrYjzcfUlclZ1AUYF8ahmWawDib7s8IFcoh6ihNk';

// Tab names to GID mapping — Google Sheets CSV export by sheet name
function csvUrl(sheetName) {
  return `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:csv&sheet=${encodeURIComponent(sheetName)}`;
}

async function fetchCSV(sheetName) {
  const url = csvUrl(sheetName);
  const res = await fetch(url);
  if (!res.ok) throw new Error(`Failed to load ${sheetName}`);
  const text = await res.text();
  return parseCSV(text);
}

function parseCSV(text) {
  const lines = text.split('\n').filter(l => l.trim());
  return lines.map(line => {
    const cols = [];
    let inQ = false, cur = '';
    for (let i = 0; i < line.length; i++) {
      const c = line[i];
      if (c === '"') { inQ = !inQ; }
      else if (c === ',' && !inQ) { cols.push(cur.trim()); cur = ''; }
      else cur += c;
    }
    cols.push(cur.trim());
    return cols;
  });
}

function now() {
  return new Date().toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});
}

// ---- LEADERBOARD ----
async function loadLeaderboard() {
  const el = document.getElementById('lb-content');
  const upd = document.getElementById('lb-updated');
  el.innerHTML = `<div class="loading"><div class="spinner"></div>Fetching standings…</div>`;
  try {
    const rows = await fetchCSV('Leaderboard');
    if (!rows || rows.length < 2) throw new Error('No data');
    
    // Find header row (look for name/player column)
    let headerIdx = 0;
    for (let i = 0; i < Math.min(5, rows.length); i++) {
      if (rows[i].some(c => c && c.length > 0)) { headerIdx = i; break; }
    }
    
    const headers = rows[headerIdx];
    const data = rows.slice(headerIdx + 1).filter(r => r.some(c => c && c.trim()));

    let html = `<div class="table-wrap"><table>
      <thead><tr>${headers.map((h,i) => `<th>${i===0?'#&nbsp;&nbsp;'+h:h}</th>`).join('')}</tr></thead>
      <tbody>`;
    
    data.forEach((row, idx) => {
      const rankClass = idx === 0 ? 'rank-1' : idx === 1 ? 'rank-2' : idx === 2 ? 'rank-3' : '';
      html += `<tr>`;
      row.forEach((cell, ci) => {
        if (ci === 0) {
          html += `<td><span class="rank ${rankClass}">${idx+1}</span> <span class="player-name">${cell}</span></td>`;
        } else {
          // Check if it looks like a score/number
          const num = parseFloat(cell);
          if (!isNaN(num) && cell.trim() !== '') {
            html += `<td><span class="score-badge">${cell}</span></td>`;
          } else {
            html += `<td>${cell}</td>`;
          }
        }
      });
      html += `</tr>`;
    });
    
    html += `</tbody></table></div>`;
    el.innerHTML = html;
    upd.textContent = `Updated ${now()}`;
  } catch(e) {
    el.innerHTML = `<div class="error-msg">⚠ Could not load leaderboard data. Make sure the sheet is published to web (File → Share → Publish to web).<br><small>${e.message}</small></div>`;
    upd.textContent = 'Failed to load';
  }
}

// ---- MATCHDAY ----
async function loadMatchday(num, btn) {
  if (btn) {
    document.querySelectorAll('.sub-tab').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
  }
  const el = document.getElementById('matches-content');
  el.innerHTML = `<div class="loading"><div class="spinner"></div>Fetching matches…</div>`;
  try {
    const rows = await fetchCSV(`Matchday ${num}`);
    if (!rows || rows.length < 2) throw new Error('No data');
    
    let html = `<div class="matches-grid">`;
    let currentDate = '';
    
    // Find data rows — look for rows that have team names / scores
    const dataRows = rows.filter(r => r.some(c => c && c.trim()));
    
    dataRows.forEach(row => {
      const nonEmpty = row.filter(c => c && c.trim());
      if (nonEmpty.length === 0) return;
      
      // Date rows usually have a single value that looks like a date
      const first = (row[0] || '').trim();
      if (nonEmpty.length <= 2 && first && (first.match(/\w+ \d+/) || first.includes('June') || first.includes('July'))) {
        currentDate = first;
        html += `<div class="date-label">📅 ${first}</div>`;
        return;
      }
      
      // Match rows: look for rows with meaningful content
      if (nonEmpty.length >= 2) {
        // Try to find team1, score1, score2, team2 pattern
        const cols = row.map(c => (c || '').trim());
        
        // Common patterns from Google Sheets match data
        // Attempt: col0=group, col1=team1, col2=score1, col3=score2, col4=team2
        // OR: col0=team1, col1=score, col2=team2
        
        let group = '', team1 = '', score1 = '', score2 = '', team2 = '';
        
        if (cols.length >= 5 && cols[0] && cols[1] && cols[4]) {
          group = cols[0];
          team1 = cols[1];
          score1 = cols[2] || '-';
          score2 = cols[3] || '-';
          team2 = cols[4];
        } else if (cols.length >= 3 && cols[0] && cols[2]) {
          team1 = cols[0];
          score1 = cols[1] || '-';
          team2 = cols[2];
        } else {
          // Generic row
          html += `<div style="padding:8px 0;color:var(--muted);font-size:13px;">${nonEmpty.join(' · ')}</div>`;
          return;
        }
        
        if (team1 && team2) {
          html += `
            <div class="match-card">
              <div>
                ${group ? `<div class="group-label">${group}</div>` : ''}
                <div class="match-team home">${team1}</div>
              </div>
              <div class="match-score">
                <span>${score1}</span>
                <span class="sep">–</span>
                <span>${score2}</span>
              </div>
              <div class="match-team away">${team2}</div>
            </div>`;
        }
      }
    });
    
    html += `</div>`;
    el.innerHTML = html;
  } catch(e) {
    el.innerHTML = `<div class="error-msg">⚠ Could not load Matchday ${num} data.<br><small>${e.message}</small></div>`;
  }
}

// ---- DRAFT ----
async function loadDraft() {
  const el = document.getElementById('draft-content');
  const upd = document.getElementById('draft-updated');
  el.innerHTML = `<div class="loading"><div class="spinner"></div>Fetching draft…</div>`;
  try {
    const rows = await fetchCSV('Draft');
    if (!rows || rows.length < 2) throw new Error('No data');
    
    const headers = rows[0];
    const data = rows.slice(1).filter(r => r.some(c => c && c.trim()));
    
    let html = `<div class="table-wrap"><table class="draft-table">
      <thead><tr>${headers.filter(h=>h).map(h=>`<th>${h}</th>`).join('')}</tr></thead>
      <tbody>`;
    
    data.forEach(row => {
      html += `<tr>${row.filter((_,i)=>headers[i]).map((cell, ci) => {
        if (ci === 0) return `<td class="player-name">${cell}</td>`;
        return `<td>${cell}</td>`;
      }).join('')}</tr>`;
    });
    
    html += `</tbody></table></div>`;
    el.innerHTML = html;
    upd.textContent = `Updated ${now()}`;
  } catch(e) {
    el.innerHTML = `<div class="error-msg">⚠ Could not load draft data.<br><small>${e.message}</small></div>`;
    upd.textContent = 'Failed to load';
  }
}

// ---- GROUPS ----
async function loadGroups() {
  const el = document.getElementById('groups-content');
  const upd = document.getElementById('groups-updated');
  el.innerHTML = `<div class="loading"><div class="spinner"></div>Fetching groups…</div>`;
  try {
    const rows = await fetchCSV('Groups');
    if (!rows || rows.length < 2) throw new Error('No data');
    
    // Try to detect group blocks
    const data = rows.filter(r => r.some(c => c && c.trim()));
    
    let html = `<div class="table-wrap"><table>
      <thead><tr>${data[0].filter(h=>h).map(h=>`<th>${h}</th>`).join('')}</tr></thead>
      <tbody>`;
    
    data.slice(1).forEach(row => {
      html += `<tr>${row.filter((_,i)=>data[0][i]!==undefined).map((cell,ci) => {
        if (ci === 0) return `<td class="player-name">${cell}</td>`;
        const num = parseFloat(cell);
        if (!isNaN(num) && cell.trim()) return `<td><span class="score-badge">${cell}</span></td>`;
        return `<td>${cell}</td>`;
      }).join('')}</tr>`;
    });
    
    html += `</tbody></table></div>`;
    el.innerHTML = html;
    upd.textContent = `Updated ${now()}`;
  } catch(e) {
    // Fallback: show embedded iframe
    el.innerHTML = `
      <div class="error-msg" style="margin-bottom:16px;">⚠ Could not parse groups data directly. Showing embedded sheet below.</div>
      <div class="embed-container">
        <iframe src="https://docs.google.com/spreadsheets/d/${SHEET_ID}/pubhtml?gid=groups&single=true&widget=false&headers=false"></iframe>
      </div>`;
    upd.textContent = 'Via embed';
  }
}

// ---- NAV ----
function showSection(id, btn) {
  document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
  document.querySelectorAll('nav button').forEach(b => b.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  btn.classList.add('active');
  loadSection(id);
}

const loaded = {};
function loadSection(id) {
  if (id === 'leaderboard') loadLeaderboard();
  else if (id === 'matches') loadMatchday(1);
  else if (id === 'draft') loadDraft();
  else if (id === 'groups') loadGroups();
}

// Initial load
loadLeaderboard();
</script>
