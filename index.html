<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>World Cup 2026 Draft</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow+Condensed:wght@400;600;700&family=Barlow:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --gold: #F5C518;
    --dark: #0a0a0f;
    --darker: #050508;
    --mid: #13131a;
    --card: #1a1a24;
    --border: #2a2a3a;
    --text: #e8e8f0;
    --muted: #888899;
    --green: #2ecc71;
    --red: #e74c3c;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: var(--darker); color: var(--text); font-family: 'Barlow', sans-serif; min-height: 100vh; overflow-x: hidden; }

  /* HEADER */
  header { background: var(--darker); border-bottom: 3px solid var(--gold); position: relative; overflow: hidden; }
  .header-bg {
    position: absolute; inset: 0;
    background: radial-gradient(ellipse at 20% 50%, rgba(197,48,32,0.18) 0%, transparent 60%),
                radial-gradient(ellipse at 80% 50%, rgba(245,197,24,0.10) 0%, transparent 60%);
  }
  .header-inner {
    position: relative; display: flex; align-items: center; justify-content: space-between;
    padding: 18px 40px; max-width: 1300px; margin: 0 auto; flex-wrap: wrap; gap: 12px;
  }
  .logo { display: flex; align-items: center; gap: 14px; }
  .logo-icon { width: 50px; height: 50px; background: var(--gold); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 26px; flex-shrink: 0; box-shadow: 0 0 20px rgba(245,197,24,0.3); }
  .logo-text h1 { font-family: 'Bebas Neue', sans-serif; font-size: 30px; letter-spacing: 2px; color: #fff; line-height: 1; }
  .logo-text span { font-family: 'Barlow Condensed', sans-serif; font-size: 12px; color: var(--gold); letter-spacing: 5px; text-transform: uppercase; }
  nav { display: flex; gap: 4px; flex-wrap: wrap; }
  nav button {
    background: transparent; border: none; color: var(--muted);
    font-family: 'Barlow Condensed', sans-serif; font-size: 13px; font-weight: 600; letter-spacing: 2px; text-transform: uppercase;
    padding: 8px 16px; cursor: pointer; border-radius: 4px; transition: all 0.2s; position: relative;
  }
  nav button:hover { color: var(--text); background: rgba(255,255,255,0.05); }
  nav button.active { color: var(--gold); }
  nav button.active::after { content: ''; position: absolute; bottom: -2px; left: 16px; right: 16px; height: 2px; background: var(--gold); }

  /* MAIN */
  main { max-width: 1300px; margin: 0 auto; padding: 40px 40px 80px; }
  .section { display: none; }
  .section.active { display: block; animation: fadeIn 0.3s ease; }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: none; } }

  .section-header { display: flex; align-items: baseline; gap: 16px; margin-bottom: 32px; border-left: 4px solid var(--gold); padding-left: 16px; }
  .section-header h2 { font-family: 'Bebas Neue', sans-serif; font-size: 44px; letter-spacing: 3px; color: #fff; line-height: 1; }
  .section-header p { color: var(--muted); font-size: 13px; font-family: 'Barlow Condensed', sans-serif; letter-spacing: 2px; text-transform: uppercase; }

  /* LOADING / ERROR */
  .loading { display: flex; align-items: center; justify-content: center; gap: 12px; padding: 60px; color: var(--muted); font-family: 'Barlow Condensed', sans-serif; letter-spacing: 2px; font-size: 14px; text-transform: uppercase; }
  .spinner { width: 20px; height: 20px; border: 2px solid var(--border); border-top-color: var(--gold); border-radius: 50%; animation: spin 0.8s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .error { background: rgba(231,76,60,0.1); border: 1px solid rgba(231,76,60,0.3); border-radius: 8px; padding: 20px 24px; color: #e88; font-size: 14px; }

  /* SUB TABS */
  .sub-tabs { display: flex; gap: 8px; margin-bottom: 24px; flex-wrap: wrap; }
  .sub-tab { background: var(--card); border: 1px solid var(--border); color: var(--muted); font-family: 'Barlow Condensed', sans-serif; font-size: 13px; font-weight: 600; letter-spacing: 2px; text-transform: uppercase; padding: 9px 22px; border-radius: 5px; cursor: pointer; transition: all 0.2s; }
  .sub-tab:hover { border-color: var(--gold); color: var(--text); }
  .sub-tab.active { background: var(--gold); color: var(--dark); border-color: var(--gold); }

  /* LEADERBOARD */
  .lb-wrap { border-radius: 12px; overflow: hidden; border: 1px solid var(--border); box-shadow: 0 8px 40px rgba(0,0,0,0.4); }
  .lb-table { width: 100%; border-collapse: collapse; }
  .lb-table thead tr { background: var(--mid); }
  .lb-table thead th { font-family: 'Barlow Condensed', sans-serif; font-size: 11px; font-weight: 600; letter-spacing: 3px; text-transform: uppercase; color: var(--gold); padding: 14px 20px; text-align: left; border-bottom: 1px solid var(--border); }
  .lb-table tbody tr { border-bottom: 1px solid rgba(42,42,58,0.5); transition: background 0.15s; }
  .lb-table tbody tr:hover { background: rgba(245,197,24,0.03); }
  .lb-table tbody tr:last-child { border-bottom: none; }
  .lb-table tbody td { padding: 14px 20px; vertical-align: middle; }
  .lb-rank { font-family: 'Bebas Neue', sans-serif; font-size: 24px; color: var(--muted); }
  .lb-rank.r1 { color: #F5C518; } .lb-rank.r2 { color: #C0C0C0; } .lb-rank.r3 { color: #CD7F32; }
  .lb-name { font-family: 'Barlow Condensed', sans-serif; font-size: 18px; font-weight: 700; }
  .lb-pts { font-family: 'Bebas Neue', sans-serif; font-size: 24px; color: var(--gold); }
  .lb-teams { font-family: 'Barlow Condensed', sans-serif; font-size: 15px; color: var(--muted); }
  .lb-prize { font-family: 'Barlow Condensed', sans-serif; font-size: 15px; font-weight: 700; color: var(--green); }

  /* MATCHES */
  .matches-container { display: flex; flex-direction: column; gap: 0; }
  .date-header { font-family: 'Bebas Neue', sans-serif; font-size: 28px; letter-spacing: 3px; color: var(--gold); padding: 24px 0 12px; border-bottom: 1px solid var(--border); margin-bottom: 12px; }
  .match-card {
    background: var(--card); border: 1px solid var(--border); border-radius: 10px;
    display: grid; grid-template-columns: 1fr auto 1fr;
    align-items: center; padding: 16px 24px; margin-bottom: 10px;
    gap: 16px; transition: border-color 0.2s;
  }
  .match-card:hover { border-color: rgba(245,197,24,0.3); }
  .match-group { font-family: 'Barlow Condensed', sans-serif; font-size: 10px; letter-spacing: 2px; color: var(--muted); text-transform: uppercase; margin-bottom: 4px; }
  .match-team-name { font-family: 'Barlow Condensed', sans-serif; font-size: 20px; font-weight: 700; display: flex; align-items: center; gap: 10px; }
  .match-team-name.home { justify-content: flex-end; }
  .match-team-flag { width: 32px; height: 21px; object-fit: cover; border-radius: 2px; box-shadow: 0 1px 4px rgba(0,0,0,0.4); }
  .match-score-wrap { display: flex; flex-direction: column; align-items: center; gap: 6px; }
  .match-score { display: flex; align-items: center; gap: 10px; font-family: 'Bebas Neue', sans-serif; font-size: 36px; letter-spacing: 2px; color: #fff; }
  .match-score .sep { color: var(--muted); font-size: 24px; }
  .match-score .s { min-width: 28px; text-align: center; }
  .live-badge { display: inline-flex; align-items: center; gap: 5px; background: rgba(231,76,60,0.15); border: 1px solid rgba(231,76,60,0.4); color: #e88; font-family: 'Barlow Condensed', sans-serif; font-size: 10px; font-weight: 700; letter-spacing: 2px; text-transform: uppercase; padding: 3px 8px; border-radius: 3px; }
  .live-dot { width: 5px; height: 5px; background: #e44; border-radius: 50%; animation: pulse 1.2s ease-in-out infinite; }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.3} }
  .upcoming-badge { font-family: 'Barlow Condensed', sans-serif; font-size: 11px; color: var(--muted); letter-spacing: 1px; }
  .home-side { text-align: right; }
  .away-side { text-align: left; }

  /* GROUPS */
  .groups-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 16px; }
  .group-card { background: var(--card); border: 1px solid var(--border); border-radius: 10px; overflow: hidden; }
  .group-card-header { background: var(--mid); padding: 10px 16px; font-family: 'Bebas Neue', sans-serif; font-size: 20px; letter-spacing: 3px; color: var(--gold); border-bottom: 1px solid var(--border); }
  .group-table { width: 100%; border-collapse: collapse; }
  .group-table thead th { font-family: 'Barlow Condensed', sans-serif; font-size: 10px; letter-spacing: 2px; text-transform: uppercase; color: var(--muted); padding: 8px 12px; text-align: center; border-bottom: 1px solid var(--border); }
  .group-table thead th:first-child { text-align: left; }
  .group-table tbody tr { border-bottom: 1px solid rgba(42,42,58,0.4); transition: background 0.15s; }
  .group-table tbody tr:last-child { border-bottom: none; }
  .group-table tbody tr:hover { background: rgba(245,197,24,0.03); }
  .group-table tbody td { padding: 9px 12px; text-align: center; font-family: 'Barlow Condensed', sans-serif; font-size: 14px; color: var(--muted); }
  .group-table tbody td:first-child { text-align: left; font-size: 15px; font-weight: 700; color: var(--text); display: flex; align-items: center; gap: 8px; }
  .group-flag { width: 24px; height: 16px; object-fit: cover; border-radius: 2px; flex-shrink: 0; }
  .pts-col { color: var(--text); font-weight: 700; font-size: 15px; }

  /* PICKS */
  .search-bar { width: 100%; padding: 14px 22px; background: var(--card); border: 1px solid var(--border); border-radius: 30px; color: var(--text); font-family: 'Barlow', sans-serif; font-size: 15px; margin-bottom: 28px; outline: none; transition: border-color 0.2s; }
  .search-bar:focus { border-color: var(--gold); }
  .search-bar::placeholder { color: var(--muted); }
  .picks-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(310px, 1fr)); gap: 20px; }
  .player-card { background: var(--card); border: 1px solid var(--border); border-radius: 14px; overflow: hidden; transition: border-color 0.2s, transform 0.2s, box-shadow 0.2s; }
  .player-card:hover { border-color: rgba(245,197,24,0.5); transform: translateY(-3px); box-shadow: 0 12px 30px rgba(0,0,0,0.4); }
  .player-card-header { display: flex; align-items: center; gap: 14px; padding: 16px 18px; background: rgba(255,255,255,0.03); border-bottom: 1px solid var(--border); }
  .avatar { width: 46px; height: 46px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-family: 'Bebas Neue', sans-serif; font-size: 17px; color: #fff; flex-shrink: 0; letter-spacing: 1px; box-shadow: 0 2px 8px rgba(0,0,0,0.3); }
  .player-info h3 { font-family: 'Barlow Condensed', sans-serif; font-size: 19px; font-weight: 700; letter-spacing: 0.5px; }
  .player-info span { font-size: 11px; color: var(--muted); font-family: 'Barlow Condensed', sans-serif; letter-spacing: 1px; text-transform: uppercase; }
  .teams-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 1px; background: var(--border); }
  .team-cell { background: var(--card); display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 13px 6px; gap: 7px; transition: background 0.15s; }
  .team-cell:hover { background: rgba(245,197,24,0.06); }
  .team-flag { width: 42px; height: 28px; object-fit: cover; border-radius: 3px; box-shadow: 0 2px 6px rgba(0,0,0,0.5); }
  .team-name { font-family: 'Barlow Condensed', sans-serif; font-size: 10px; letter-spacing: 0.5px; color: var(--muted); text-align: center; text-transform: uppercase; line-height: 1.2; }
  .no-results { text-align: center; padding: 60px 20px; color: var(--muted); font-family: 'Barlow Condensed', sans-serif; font-size: 16px; letter-spacing: 2px; text-transform: uppercase; }

  @media (max-width: 768px) {
    .header-inner { padding: 14px 20px; }
    nav button { padding: 6px 10px; font-size: 11px; }
    main { padding: 24px 16px 60px; }
    .section-header h2 { font-size: 32px; }
    .picks-grid { grid-template-columns: 1fr; }
    .groups-grid { grid-template-columns: 1fr; }
    .match-card { grid-template-columns: 1fr; text-align: center; }
    .match-team-name.home { justify-content: center; }
    .match-score { justify-content: center; }
  }
</style>
</head>
<body>
<header>
  <div class="header-bg"></div>
  <div class="header-inner">
    <div class="logo">
      <div class="logo-icon">⚽</div>
      <div class="logo-text">
        <h1>World Cup 2026</h1>
        <span>Draft League</span>
      </div>
    </div>
    <nav>
      <button class="active" onclick="showSection('leaderboard',this)">Leaderboard</button>
      <button onclick="showSection('matches',this)">Matches</button>
      <button onclick="showSection('picks',this)">Player Picks</button>
      <button onclick="showSection('groups',this)">Groups</button>
    </nav>
  </div>
</header>

<main>
  <!-- LEADERBOARD -->
  <div class="section active" id="leaderboard">
    <div class="section-header"><h2>Leaderboard</h2><p>Live standings</p></div>
    <div id="lb-content"><div class="loading"><div class="spinner"></div>Loading standings…</div></div>
  </div>

  <!-- MATCHES -->
  <div class="section" id="matches">
    <div class="section-header"><h2>Matches</h2><p>Matchday results</p></div>
    <div class="sub-tabs">
      <button class="sub-tab active" onclick="loadMatchday(1,this)">Matchday 1</button>
      <button class="sub-tab" onclick="loadMatchday(2,this)">Matchday 2</button>
      <button class="sub-tab" onclick="loadMatchday(3,this)">Matchday 3</button>
    </div>
    <div id="matches-content"><div class="loading"><div class="spinner"></div>Loading matches…</div></div>
  </div>

  <!-- PLAYER PICKS -->
  <div class="section" id="picks">
    <div class="section-header"><h2>Player Picks</h2><p>Draft selections</p></div>
    <input class="search-bar" type="text" placeholder="🔍  Search by player name or team..." oninput="filterPicks(this.value)">
    <div class="picks-grid" id="picks-grid"></div>
    <div class="no-results" id="no-results" style="display:none">No results found</div>
  </div>

  <!-- GROUPS -->
  <div class="section" id="groups">
    <div class="section-header"><h2>Groups</h2><p>Group stage standings</p></div>
    <div id="groups-content"><div class="loading"><div class="spinner"></div>Loading groups…</div></div>
  </div>
</main>

<script>
const BASE = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vQ6F2WCGWZxZgg6TCnjpODIAT4TNxR53OFNUtLFaeElyAthAYoTudjKQr-kVEGlZH3rf2IDieTerOAx/pub?output=csv&gid=';
const GIDS = { leaderboard:'1101782913', md1:'1655786227', md2:'1080001360', md3:'782783342', groups:'1340150710' };

const FLAGS = {
  "Argentina":"ar","Belgium":"be","Uruguay":"uy","Sweden":"se","Algeria":"dz","Egypt":"eg","Panama":"pa","Jordan":"jo",
  "Brazil":"br","Germany":"de","Mexico":"mx","Morocco":"ma","Ivory Coast":"ci","Cape Verde":"cv","Spain":"es","Croatia":"hr",
  "Colombia":"co","Canada":"ca","Ghana":"gh","Australia":"au","Tunisia":"tn","Iraq":"iq","England":"gb-eng","Portugal":"pt",
  "Turkey":"tr","Paraguay":"py","South Africa":"za","New Zealand":"nz","Japan":"jp","Bosnia-Herzegovina":"ba","Congo DR":"cd",
  "Haiti":"ht","United States":"us","Norway":"no","Switzerland":"ch","Senegal":"sn","Qatar":"qa","Curacao":"cw","Ecuador":"ec",
  "Netherlands":"nl","Scotland":"gb-sct","Czechia":"cz","Uzbekistan":"uz","Austria":"at","South Korea":"kr","Saudi Arabia":"sa",
  "France":"fr","Iran":"ir","Bosnia Herzegovina":"ba","Ivory coast":"ci"
};
function flag(c) { const code=FLAGS[c]||FLAGS[c?.trim()]; return code?`https://flagcdn.com/w40/${code}.png`:'https://flagcdn.com/w40/un.png'; }

async function fetchCSV(gid) {
  const r = await fetch(BASE + gid);
  if (!r.ok) throw new Error('Failed to fetch');
  const t = await r.text();
  return t.split('\n').map(line => {
    const cols=[]; let inQ=false, cur='';
    for(let i=0;i<line.length;i++){
      const c=line[i];
      if(c==='"'){inQ=!inQ;}
      else if(c===','&&!inQ){cols.push(cur.trim());cur='';}
      else cur+=c;
    }
    cols.push(cur.trim());
    return cols;
  }).filter(r=>r.some(c=>c));
}

// LEADERBOARD
async function loadLeaderboard() {
  try {
    const rows = await fetchCSV(GIDS.leaderboard);
    // Row 1=blank, Row 2=title, Row 3=headers, Row 4+=data
    // Columns: B=Rank, C=Name, D=TeamsIn, E=Points, F=Prize (0-indexed: 1,2,3,4,5)
    const data = rows.slice(3).filter(r => r[2] && r[2].trim());
    let html = `<div class="lb-wrap"><table class="lb-table">
      <thead><tr><th>#</th><th>Player</th><th>Teams In</th><th>Points</th><th>Prize</th></tr></thead><tbody>`;
    data.forEach((row, i) => {
      const rank = row[1]||String(i+1);
      const rankNum = parseInt(rank)||i+1;
      const rc = rankNum===1?'r1':rankNum===2?'r2':rankNum===3?'r3':'';
      const name = row[2]||'';
      const teamsIn = row[3]||'—';
      const pts = row[4]||'0';
      const prize = row[5]||'';
      html += `<tr>
        <td><span class="lb-rank ${rc}">${rank}</span></td>
        <td><span class="lb-name">${name}</span></td>
        <td><span class="lb-teams">${teamsIn}</span></td>
        <td><span class="lb-pts">${pts}</span></td>
        <td><span class="lb-prize">${prize}</span></td>
      </tr>`;
    });
    html += `</tbody></table></div>`;
    document.getElementById('lb-content').innerHTML = html;
  } catch(e) {
    document.getElementById('lb-content').innerHTML = `<div class="error">⚠ Could not load leaderboard. Make sure the sheet is published to web.</div>`;
  }
}

// MATCHES
const mdLoaded = {};
async function loadMatchday(num, btn) {
  if (btn) {
    document.querySelectorAll('.sub-tab').forEach(b=>b.classList.remove('active'));
    btn.classList.add('active');
  }
  const el = document.getElementById('matches-content');
  el.innerHTML = `<div class="loading"><div class="spinner"></div>Loading matches…</div>`;
  try {
    const rows = await fetchCSV(GIDS['md'+num]);
    let html = `<div class="matches-container">`;
    let currentDate = '';
    rows.forEach(row => {
      const a=(row[0]||'').trim(), b=(row[1]||'').trim(), c=(row[2]||'').trim(),
            d=(row[3]||'').trim(), e=(row[4]||'').trim(), f=(row[5]||'').trim();
      // Date row: col B has month name, nothing in A or sparse
      if (!a && b && /june|july|august|\d{1,2}/i.test(b) && !c && !d) {
        currentDate = b;
        html += `<div class="date-header">📅 ${b}</div>`;
        return;
      }
      // Match row: has team names in B and E
      if (b && e) {
        const isLive = /live/i.test(f);
        const hasScore = c !== '' || d !== '';
        html += `<div class="match-card">
          <div class="home-side">
            <div class="match-group">${a}</div>
            <div class="match-team-name home">
              <span>${b}</span>
              <img class="match-team-flag" src="${flag(b)}" alt="${b}" onerror="this.style.display='none'">
            </div>
          </div>
          <div class="match-score-wrap">
            <div class="match-score">
              <span class="s">${hasScore?c:'–'}</span>
              <span class="sep">:</span>
              <span class="s">${hasScore?d:'–'}</span>
            </div>
            ${isLive?`<div class="live-badge"><div class="live-dot"></div>Live</div>`
              :hasScore?'':`<div class="upcoming-badge">Upcoming</div>`}
          </div>
          <div class="away-side">
            <div class="match-group"></div>
            <div class="match-team-name">
              <img class="match-team-flag" src="${flag(e)}" alt="${e}" onerror="this.style.display='none'">
              <span>${e}</span>
            </div>
          </div>
        </div>`;
      }
    });
    html += `</div>`;
    el.innerHTML = html;
  } catch(e) {
    el.innerHTML = `<div class="error">⚠ Could not load matchday data.</div>`;
  }
}

// GROUPS
async function loadGroups() {
  try {
    const rows = await fetchCSV(GIDS.groups);
    // Groups are laid out in 3 columns across the sheet
    // Each group block starts with "Group X" header row
    // Columns: A=Team, B=MP, C=W, D=D, E=L, F=GF, G=GA, H=GD, I=Pts
    // Then repeats at K, U for groups B and C in same row band
    const groups = {};
    let currentGroups = [];

    rows.forEach(row => {
      // Check if this row has group headers (Group A, Group B, etc.)
      const groupCols = [0, 10, 20]; // approx col offsets for 3 group columns
      groupCols.forEach(offset => {
        const cell = (row[offset]||'').trim();
        if (/^group\s+[a-z]/i.test(cell)) {
          if (!groups[cell]) groups[cell] = [];
          currentGroups[offset] = cell;
        } else if (cell && currentGroups[offset] && !/^mp$|^w$|^d$|^l$/i.test(cell)) {
          // It's a team row
          const g = currentGroups[offset];
          if (g && cell) {
            groups[g].push({
              name: cell,
              mp: row[offset+1]||'0', w: row[offset+2]||'0',
              d: row[offset+3]||'0', l: row[offset+4]||'0',
              gf: row[offset+5]||'0', ga: row[offset+6]||'0',
              gd: row[offset+7]||'0', pts: row[offset+8]||'0'
            });
          }
        }
      });
    });

    const groupNames = Object.keys(groups).sort();
    if (groupNames.length === 0) throw new Error('No groups found');

    let html = `<div class="groups-grid">`;
    groupNames.forEach(gname => {
      const teams = groups[gname];
      html += `<div class="group-card">
        <div class="group-card-header">${gname}</div>
        <table class="group-table">
          <thead><tr><th>Team</th><th>MP</th><th>W</th><th>D</th><th>L</th><th>GD</th><th>Pts</th></tr></thead>
          <tbody>`;
      teams.forEach(t => {
        html += `<tr>
          <td><img class="group-flag" src="${flag(t.name)}" alt="${t.name}" onerror="this.style.display='none'">${t.name}</td>
          <td>${t.mp}</td><td>${t.w}</td><td>${t.d}</td><td>${t.l}</td><td>${t.gd}</td>
          <td class="pts-col">${t.pts}</td>
        </tr>`;
      });
      html += `</tbody></table></div>`;
    });
    html += `</div>`;
    document.getElementById('groups-content').innerHTML = html;
  } catch(e) {
    document.getElementById('groups-content').innerHTML = `<div class="error">⚠ Could not load groups data.</div>`;
  }
}

function getInitials(n){return n.split(' ').map(w=>w[0]).join('').toUpperCase().slice(0,2);}
function buildCard(p,i){
  const color=COLORS[i%COLORS.length];
  const teams=p.teams.map(t=>`<div class="team-cell"><img class="team-flag" src="${flag(t)}" alt="${t}" loading="lazy" onerror="this.src='https://flagcdn.com/w40/un.png'"><div class="team-name">${t}</div></div>`).join('');
  return `<div class="player-card" data-name="${p.name.toLowerCase()}" data-teams="${p.teams.join(' ').toLowerCase()}">
    <div class="player-card-header">
      <div class="avatar" style="background:${color}">${getInitials(p.name)}</div>
      <div class="player-info"><h3>${p.name}</h3><span>${p.teams.length} teams picked</span></div>
    </div>
    <div class="teams-grid">${teams}</div>
  </div>`;
}
function renderPicks(){document.getElementById('picks-grid').innerHTML=PLAYERS.map((p,i)=>buildCard(p,i)).join('');}
function filterPicks(q){
  q=q.toLowerCase().trim(); let v=0;
  document.querySelectorAll('.player-card').forEach(c=>{
    const show=!q||c.dataset.name.includes(q)||c.dataset.teams.includes(q);
    c.style.display=show?'':'none'; if(show)v++;
  });
  document.getElementById('no-results').style.display=v===0?'block':'none';
}

// NAV
const sectionLoaded = {};
function showSection(id, btn) {
  document.querySelectorAll('.section').forEach(s=>s.classList.remove('active'));
  document.querySelectorAll('nav button').forEach(b=>b.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  btn.classList.add('active');
  if (!sectionLoaded[id]) { sectionLoaded[id]=true; loadSection(id); }
}
function loadSection(id) {
  if (id==='leaderboard') loadLeaderboard();
  else if (id==='matches') loadMatchday(1);
  else if (id==='groups') loadGroups();
}
