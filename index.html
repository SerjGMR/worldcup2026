<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>World Cup 2026 Draft</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Barlow+Condensed:wght@400;600;700&family=Barlow:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --gold: #F5C518;
    --red: #C0392B;
    --dark: #0a0a0f;
    --darker: #050508;
    --mid: #13131a;
    --card: #1a1a24;
    --border: #2a2a3a;
    --text: #e8e8f0;
    --muted: #888899;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--darker);
    color: var(--text);
    font-family: 'Barlow', sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
  }

  header {
    background: var(--darker);
    border-bottom: 3px solid var(--gold);
    position: relative;
    overflow: hidden;
  }

  .header-bg {
    position: absolute;
    inset: 0;
    background: 
      radial-gradient(ellipse at 20% 50%, rgba(197,48,32,0.15) 0%, transparent 60%),
      radial-gradient(ellipse at 80% 50%, rgba(245,197,24,0.08) 0%, transparent 60%);
  }

  .header-inner {
    position: relative;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 18px 40px;
    max-width: 1300px;
    margin: 0 auto;
    flex-wrap: wrap;
    gap: 12px;
  }

  .logo {
    display: flex;
    align-items: center;
    gap: 14px;
  }

  .logo-icon {
    width: 48px; height: 48px;
    background: var(--gold);
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 24px;
    flex-shrink: 0;
  }

  .logo-text h1 {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 28px;
    letter-spacing: 2px;
    color: #fff;
    line-height: 1;
  }

  .logo-text span {
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 13px;
    color: var(--gold);
    letter-spacing: 4px;
    text-transform: uppercase;
  }

  nav { display: flex; gap: 4px; flex-wrap: wrap; }

  nav button {
    background: transparent;
    border: none;
    color: var(--muted);
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 13px;
    font-weight: 600;
    letter-spacing: 2px;
    text-transform: uppercase;
    padding: 8px 16px;
    cursor: pointer;
    border-radius: 4px;
    transition: all 0.2s;
    position: relative;
  }

  nav button:hover { color: var(--text); background: rgba(255,255,255,0.05); }
  nav button.active { color: var(--gold); }
  nav button.active::after {
    content: '';
    position: absolute;
    bottom: -2px;
    left: 16px; right: 16px;
    height: 2px;
    background: var(--gold);
  }

  main {
    max-width: 1300px;
    margin: 0 auto;
    padding: 40px 40px 80px;
  }

  .section { display: none; }
  .section.active { display: block; }

  .section-header {
    display: flex;
    align-items: baseline;
    gap: 16px;
    margin-bottom: 28px;
    border-left: 4px solid var(--gold);
    padding-left: 16px;
  }

  .section-header h2 {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 42px;
    letter-spacing: 3px;
    color: #fff;
    line-height: 1;
  }

  .section-header p {
    color: var(--muted);
    font-size: 13px;
    font-family: 'Barlow Condensed', sans-serif;
    letter-spacing: 2px;
    text-transform: uppercase;
  }

  .sub-tabs {
    display: flex;
    gap: 8px;
    margin-bottom: 24px;
    flex-wrap: wrap;
  }

  .sub-tab {
    background: var(--card);
    border: 1px solid var(--border);
    color: var(--muted);
    font-family: 'Barlow Condensed', sans-serif;
    font-size: 13px;
    font-weight: 600;
    letter-spacing: 2px;
    text-transform: uppercase;
    padding: 8px 20px;
    border-radius: 4px;
    cursor: pointer;
    transition: all 0.2s;
  }

  .sub-tab:hover { border-color: var(--gold); color: var(--text); }
  .sub-tab.active { background: var(--gold); color: var(--dark); border-color: var(--gold); }

  .embed-wrap {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 10px;
    overflow: hidden;
    box-shadow: 0 8px 40px rgba(0,0,0,0.4);
  }

  .embed-wrap iframe {
    width: 100%;
    height: 720px;
    border: none;
    display: block;
    background: #fff;
  }

  @media (max-width: 768px) {
    .header-inner { padding: 14px 20px; }
    nav button { padding: 6px 10px; font-size: 11px; }
    main { padding: 24px 16px 60px; }
    .section-header h2 { font-size: 30px; }
    .embed-wrap iframe { height: 500px; }
  }
</style>
</head>
<body>

<header>
  <div class="header-bg"></div>
  <div class="header-inner">
    <div class="logo">
      <div class="logo-icon">⚽</div>
      <div class="logo-text">
        <h1>World Cup 2026</h1>
        <span>Draft League</span>
      </div>
    </div>
    <nav>
      <button class="active" onclick="showSection('leaderboard', this)">Leaderboard</button>
      <button onclick="showSection('matches', this)">Matches</button>
      <button onclick="showSection('draft', this)">Draft</button>
      <button onclick="showSection('groups', this)">Groups</button>
    </nav>
  </div>
</header>

<main>

  <!-- LEADERBOARD -->
  <div class="section active" id="leaderboard">
    <div class="section-header">
      <h2>Leaderboard</h2>
      <p>Live standings</p>
    </div>
    <div class="embed-wrap">
      <iframe src="https://docs.google.com/spreadsheets/d/1SIXgrYjzcfUlclZ1AUYF8ahmWawDib7s8IFcoh6ihNk/pubhtml?gid=1101782913&single=true&widget=false&headers=false"></iframe>
    </div>
  </div>

  <!-- MATCHES -->
  <div class="section" id="matches">
    <div class="section-header">
      <h2>Matches</h2>
      <p>Matchday results</p>
    </div>
    <div class="sub-tabs">
      <button class="sub-tab active" onclick="switchMatchday('md1', this)">Matchday 1</button>
      <button class="sub-tab" onclick="switchMatchday('md2', this)">Matchday 2</button>
      <button class="sub-tab" onclick="switchMatchday('md3', this)">Matchday 3</button>
    </div>
    <div id="md1" class="embed-wrap">
      <iframe src="https://docs.google.com/spreadsheets/d/1SIXgrYjzcfUlclZ1AUYF8ahmWawDib7s8IFcoh6ihNk/pubhtml?gid=1655786227&single=true&widget=false&headers=false"></iframe>
    </div>
    <div id="md2" class="embed-wrap" style="display:none">
      <iframe src="https://docs.google.com/spreadsheets/d/1SIXgrYjzcfUlclZ1AUYF8ahmWawDib7s8IFcoh6ihNk/pubhtml?gid=1080001360&single=true&widget=false&headers=false"></iframe>
    </div>
    <div id="md3" class="embed-wrap" style="display:none">
      <iframe src="https://docs.google.com/spreadsheets/d/1SIXgrYjzcfUlclZ1AUYF8ahmWawDib7s8IFcoh6ihNk/pubhtml?gid=782783342&single=true&widget=false&headers=false"></iframe>
    </div>
  </div>

  <!-- DRAFT -->
  <div class="section" id="draft">
    <div class="section-header">
      <h2>Draft</h2>
      <p>Team selections</p>
    </div>
    <div class="embed-wrap">
      <iframe src="https://docs.google.com/spreadsheets/d/1SIXgrYjzcfUlclZ1AUYF8ahmWawDib7s8IFcoh6ihNk/pubhtml?gid=213895062&single=true&widget=false&headers=false"></iframe>
    </div>
  </div>

  <!-- GROUPS -->
  <div class="section" id="groups">
    <div class="section-header">
      <h2>Groups</h2>
      <p>Group stage standings</p>
    </div>
    <div class="embed-wrap">
      <iframe src="https://docs.google.com/spreadsheets/d/1SIXgrYjzcfUlclZ1AUYF8ahmWawDib7s8IFcoh6ihNk/pubhtml?gid=1340150710&single=true&widget=false&headers=false"></iframe>
    </div>
  </div>

</main>

<script>
  function showSection(id, btn) {
    document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
    document.querySelectorAll('nav button').forEach(b => b.classList.remove('active'));
    document.getElementById(id).classList.add('active');
    btn.classList.add('active');
  }

  function switchMatchday(id, btn) {
    document.querySelectorAll('#md1, #md2, #md3').forEach(el => el.style.display = 'none');
    document.querySelectorAll('.sub-tab').forEach(b => b.classList.remove('active'));
    document.getElementById(id).style.display = 'block';
    btn.classList.add('active');
  }
</script>

</body>
</html>
